name: Release Python Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to release (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: hdbhelper-py
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in semver format (e.g. 0.1.0)"
            exit 1
          fi

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest -v

      - name: Update version in pyproject.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' pyproject.toml
          grep '^version' pyproject.toml

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Commit version bump
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hdbhelper-py/pyproject.toml
          git commit -m "chore(hdbhelper-py): bump version to ${{ inputs.version }}"

      - name: Create and push tag
        working-directory: .
        run: |
          TAG="hdbhelper-py/v${{ inputs.version }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin HEAD "$TAG"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: hdbhelper-py/dist/
